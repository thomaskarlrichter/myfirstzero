{% extends 'base.html' %}
{% block title %}Fehler {{ code }} – Die Komitee-App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="display-1 fw-bold text-primary">{{ code }}</div>
        <h3 class="mt-3 mb-3 text-muted">{{ message }}</h3>
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            <i class="bi bi-house-fill me-1"></i>Zur Startseite
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">
            <i class="bi bi-arrow-left me-1"></i>Zurück
        </a>
    </div>
</div>
{% endblock %}
