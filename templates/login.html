{% extends 'base.html' %}
{% block title %}Anmelden – Die Komitee-App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Anmelden</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i>Benutzername
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Dein Benutzername" required autofocus
                               value="{{ request.form.get('username', '') }}">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>Passwort
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password"
                                   name="password" placeholder="Dein Passwort" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Angemeldet bleiben</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted py-3">
                Noch kein Konto?
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Jetzt registrieren</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
